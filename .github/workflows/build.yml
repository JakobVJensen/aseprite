name: Build Aseprite (Windows)

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install Ninja
      uses: aseprite/get-ninja@main

    - name: Download Skia
      shell: bash
      run: |
        this_dir=$(cygpath "${{ github.workspace }}")
        skia_url=$(source $this_dir/laf/misc/skia-url.sh | xargs)
        skia_file=$(basename $skia_url)
        curl -L -o "$skia_file" "$skia_url"
        unzip "$skia_file" -d skia

    - name: Configure CMake
      shell: bash
      run: |
        cmake -S . -B build -G Ninja \
        -DCMAKE_BUILD_TYPE=RelWithDebInfo \
        -DENABLE_TESTS=OFF \
        -DENABLE_SCRIPTING=ON \
        -DLAF_BACKEND=skia \
        -DSKIA_DIR=$(realpath skia) \
        -DSKIA_LIBRARY_DIR=$(realpath skia/out/Release-x64)

    - name: Build
      shell: bash
      run: |
        cd build
        ninja

    - name: Upload Windows Build
      uses: actions/upload-artifact@v4
      with:
        name: aseprite-windows
        path: build/bin/
